# 站点配置
site:
    # 站点 URL（以斜杠结尾）
    siteURL: "https://www.245959623.xyz/"
    # 站点标题
    title: "咸林智维"
    # 站点副标题
    subtitle:
      - "观察 · 部署 · 维护"
      - "熵 · 治未病"
      - "看见看不见的问题"
      - "让改变发生"
    # 语言配置
    lang: "zh"
    # 翻译配置
    translate:
        # 启用翻译功能（中文博客可关闭）
        enable: true
        # 翻译服务
        service: "client.edge"
        # 显示语言选择下拉框
        showSelectTag: true
        # 自动检测用户语言
        autoDiscriminate: true
        # 翻译时忽略的 CSS 类名
        ignoreClasses:
            - "ignore"
            - "banner-title"
            - "banner-subtitle"
        # 翻译时忽略的 HTML 标签
        ignoreTags:
            - "script"
            - "style"
            - "code"
            - "pre"
    # 时区配置
    timeZone: 8
    # 字体配置
    font:
        # 示例字体配置 - Zen Maru Gothic
        "Example - ZenMaruGothic":
            # 字体源 (字体 CSS 链接 | 字体文件路径)
            src: "https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap"
            # 字体名 (font-family)
            family: "Zen Maru Gothic"
    # 主题色配置
    themeColor:
        # 主题色的默认色相 (范围从 0 到 360)
        hue: 255
    # 默认主题 ("system" 跟随系统 | "light" 浅色 | "dark" 深色)
    defaultTheme: "dark"
    # 壁纸配置
    wallpaper:
        # 模式 ("banner" 横幅 | "fullscreen" 全屏 | "none" 纯色)
        mode: "banner"
        # 图片源配置
        src:
            # 桌面壁纸图片
            desktop:
                - "/assets/images/desktopWallpaper_1.jpg"
                - "/assets/images/desktopWallpaper_2.jpg"
                - "/assets/images/desktopWallpaper_3.jpg"
            # 移动壁纸图片
            mobile:
                - "/assets/images/mobileWallpaper_1.jpg"
                - "/assets/images/mobileWallpaper_2.jpg"
        # 壁纸位置
        position: "center"
        # 轮播配置
        carousel:
            # 为多张图片启用轮播
            enable: true
            # 轮播间隔时间 (秒)
            interval: 3.6
            # 启用 Ken Burns 效果
            kenBurns: true
        # Banner 模式专属配置
        banner:
            # 横幅文本配置
            homeText:
                # 在主页显示文本
                enable: true
                # 主标题（与站点标题统一）
                title: "咸林智维"
                # 副标题
                subtitle:
                    - "观察 · 部署 · 维护"
                    - "熵 · 治未病"
                    - "看见看不见的问题"
                    - "让改变发生"
                # 副标题打字机效果
                typewriter:
                    enable: true
                    speed: 111
                    deleteSpeed: 51
                    pauseTime: 3000
            # 横幅图片来源文本
            credit:
                enable: false
                text: "Describe"
                url: ""
            # 导航栏配置
            navbar:
                # 导航栏透明模式
                transparentMode: "semifull"
            # 水波纹效果配置
            waves:
                enable: true
                performanceMode: false
        # Fullscreen 模式专属配置
        fullscreen:
            zIndex: -1
            opacity: 0.9
            blur: 3
            navbar:
                transparentMode: "semi"
    # 加载页配置
    loadingOverlay:
        enable: true
        waitForAllResources: true
        # 加载标题配置
        title:
            enable: true
            # 加载标题文本
            content:
              - "咸林智维"
              - "Xianlin ZW"
              - "观察中..."
              - "降熵中..."
              - "让改变发生"
            # 动画周期 (s)
            interval: 1.5
        # 加载动画配置
        spinner:
            enable: true
            interval: 1.5
    # favicon 配置
    favicon: []
    # bangumi 配置
    bangumi:
        userId: "your-bangumi-id"
    # OpenGraph 配置
    generateOgImages: false

# Umami统计配置
umami:
    enabled: false
    baseUrl: "https://api.umami.is"
    apiKey: ""
    scripts: ""

# 导航栏配置
navbar:
  links:
    # 一级导航链接 - 主页
    - "Home"
    # 一级导航链接 - 归档
    - "Archive"
    - "Projects"
    - "Timeline"
    
    # 一级导航链接 - 点歌系统
    - name: "咸中广播"
      url: "/voicehub"
      icon: "material-symbols:music-note"
      description: "VoiceHub 校园广播点歌系统"
      children:
        - name: "点歌系统"
          url: "/voicehub-player"
          icon: "material-symbols:play-arrow"
        - name: "本周热播"
          url: "/broadcast"
          icon: "material-symbols:queue-music"
        - name: "点歌指南"
          url: "/voicehub-guide"
          icon: "material-symbols:help-outline"
        - name: "班级账号"
          url: "/voicehub-accounts"
          icon: "material-symbols:groups"
    
    # 一级导航链接 - 好友
    - "Friends"
    # 一级导航链接 - 关于
    - "About"


# 侧边栏配置
sidebar:
    components:
        # 左侧侧边栏
        left:
            - type: "profile"
              position: "top"
            - type: "announcement"
              position: "top"
            - type: "categories"
              position: "sticky"
              responsive:
                  collapseThreshold: 5
              depth: 3
            - type: "tags"
              position: "sticky"
              responsive:
                  collapseThreshold: 20
        # 右侧侧边栏
        right:
            - type: "toc"
              position: "sticky"
              depth: 3
            - type: "statistics"
              position: "sticky"
              visibility:
                  mode: "include"
                  paths: ["^/$", "^/archive$"]

# 资料配置
profile:
    avatar: "/assets/images/avatar.jpg"
    name: "咸林智维"
    bio: "观察 · 部署 · 维护 | 让改变发生"
    links:
    - name: "GitHub"
      icon: "fa6-brands:github"
      url: "https://github.com/WuMengAA"
    - name: "QQ群"
      icon: "fa6-brands:qq"
      url: "https://qm.qq.com/q/CGyHwuq44E"
    - name: "哔哩哔哩"
      icon: "fa6-brands:bilibili"
      url: "https://space.bilibili.com/3461562041895547"
    - name: "点歌系统"
      icon: "material-symbols:music-note"
      url: "https://245959623.xyz"

# 公告配置
announcement:
    title: "咸林智维"
    content: "学生技术志愿服务组织 · 观察 · 部署 · 维护"
    closable: true
    link:
        enable: true
        text: "了解我们"
        url: "/about/"
        external: true

# 文章配置
post:
    showLastModified: true
    expressiveCode:
        theme: "github-dark"
    license:
        enable: true
        name: "CC BY-NC-SA 4.0"
        url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
    comment:
        enable: false
        twikoo:
            envId: "https://twikoo.vercel.app"
            lang: "zh"

# 页脚配置
footer:
    enable: true
    customHtml: "v0.0.1"

# 粒子特效配置
particle:
    enable: true
    # 粒子数量
    particleNum: 24
    limitTimes: -1
    size:
        min: 0.3
        max: 0.9
    opacity:
        min: 0.3
        max: 0.9
    speed:
        horizontal:
            min: -0.9
            max: 0.9
        vertical:
            min: 0.15
            max: 0.3
        rotation: 0.12
        fadeSpeed: 0.12
    zIndex: 100

# 音乐播放器配置
musicPlayer:
    enable: false
    mode: "meting"
    meting:
        meting_api: "https://api.i-meto.com/meting/api"
        server: "netease"
        type: "playlist"
        id: "2161912966"
    local:
        playlist:
            - id: 1
              title: "深海之息"
              artist: "Youzee Music"
              cover: "https://p1.music.126.net/PhKOqFtljgHDDpKYM2ADUA==/109951169858309716.jpg"
              url: "assets/music/深海之息.m4a"
              lrc: "assets/music/深海之息.lrc"
              duration: 146
    autoplay: false

# 看板娘配置
pio:
    enable: false
    models:
        - "/pio/models/pio/model.json"
    # 改为右侧避免遮挡左侧侧边栏
    position: "right"
    width: 280
    height: 250
    mode: "draggable"
    hiddenOnMobile: false
    dialog:
        welcome: "欢迎来到咸林智维！"
        touch:
            - "你在做什么呀？"
            - "别戳我啦！"
            - "再戳我要生气了！"
        home: "点击这里回到首页～"
        close: "下次再见～"
        link: "https://nav.kungal.org"
